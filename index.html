<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You Are Being Optimized</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <audio id="bgm" src="Sound/backgroundmusic.mp3" loop preload="auto"></audio>
  <script>
    (function(){
      var a = document.getElementById("bgm");
      a.volume = 0.5;
      var p = a.play();
      if (p && p.catch) p.catch(function(){
        document.addEventListener("click", function u(){ a.play(); document.removeEventListener("click", u); }, {once:true});
      });
    })();
  </script>
  <script src="script.js"></script>
</body>
</html>
